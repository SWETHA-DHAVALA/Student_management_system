<!DOCTYPE html>
<html>
<head>
    <title>Attendance Details</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .attendance-container {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        .attendance-container img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #5b86e5;
            margin-bottom: 15px;
        }

        h2 {
            color: #5b86e5;
            margin-bottom: 20px;
        }

        .info p {
            font-size: 16px;
            margin: 8px 0;
        }

        .progress-bar {
            width: 100%;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress {
            height: 20px;
            background: #36d1dc;
            width: 0%;
            text-align: center;
            color: white;
            line-height: 20px;
        }

        .back-btn {
            margin-top: 20px;
        }

        .back-btn button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #5b86e5;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn button:hover {
            background: #3a63c9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="attendance-container">
        <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Student Photo">

        <h2>Attendance Details</h2>

        <div class="info">
            <p><strong>Total Classes Held:</strong> <span id="total">120</span></p>
            <p><strong>Classes Attended:</strong> <span id="attended">102</span></p>
            <p><strong>Attendance Percentage:</strong> <span id="percentage"></span></p>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>

        <div class="back-btn">
            <button onclick="goBack()">Back to Dashboard</button>
        </div>
    </div>

    <script>
        let total = 120;
        let attended = 102;

        let percentage = ((attended / total) * 100).toFixed(2);

        document.getElementById("percentage").innerText = percentage + "%";
        document.getElementById("progressBar").style.width = percentage + "%";
        document.getElementById("progressBar").innerText = percentage + "%";

        function goBack() {
            window.location.href = "dashboard.html";
        }
    </script>

</body>
</html>
