<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2e59d9, #6a82fb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        .dashboard img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #2e59d9;
            margin-bottom: 15px;
        }

        h2 {
            color: #2e59d9;
            margin-bottom: 10px;
        }

        p {
            margin: 5px 0;
            color: #555;
        }

        .menu button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background-color: #4e73df;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .menu button:hover {
            background-color: #2e59d9;
            transform: scale(1.03);
        }

        .logout-btn {
            margin-top: 15px;
            background: #e74a3b;
        }

        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>

<div class="dashboard">

    <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Student Photo">

    <!-- ✅ Dynamic Name -->
    <h2 id="studentName">Welcome</h2>

    <!-- ✅ Extra Details -->
    <p id="roll"></p>
    <p id="dept"></p>
    <p id="section"></p>

    <div class="menu">
        <button onclick="goToPage('student-details.html')">Student Details</button>
        <button onclick="goToPage('attendance.html')">Attendance</button>
        <button onclick="goToPage('academics.html')">Academics</button>
        <button onclick="goToPage('fees.html')">Fee Details</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

</div>

<script>

// 🔥 Get student data from localStorage
const student = JSON.parse(localStorage.getItem("student"));

if(student){

// ✅ Set dynamic values
document.getElementById("studentName").innerText = "Welcome, " + student.name;
document.getElementById("roll").innerText = "Roll No: " + student.rollNumber;
document.getElementById("dept").innerText = "Department: " + student.department;
document.getElementById("section").innerText = "Section: " + student.section;

}else{

// ❌ If not logged in
window.location.href = "login1.html";

}

// 🔗 Navigation function
function goToPage(page){
    window.location.href = page;
}

// 🚪 Logout
function logout(){
    localStorage.removeItem("student");
    window.location.href = "login1.html";
}

</script>

</body>
</html>
